{% extends 'base.html' %}
{% block content %}

<h4>💖 Saved Jobs</h4>

{% for item in saved_jobs %}

<div class="card mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">

        <div>
            <h6>{{ item.job.title }}</h6>
            <small>{{ item.job.company }} • {{ item.job.location }}</small>
        </div>

        <div class="d-flex gap-2">

            <a href="/jobs/{{ item.job.id }}/" class="btn btn-primary btn-sm">
                View
            </a>

            <button class="btn btn-danger btn-sm"
                    onclick="removeSaved({{ item.job.id }}, this)">
                Remove
            </button>

        </div>

    </div>
</div>

{% empty %}
<p>No saved jobs yet.</p>
{% endfor %}

<script>
function removeSaved(jobId, btn) {
    fetch(`/jobs/save/${jobId}/`, {
        method: "POST",
        headers: {
            "X-CSRFToken": getCookie("csrftoken"),
        }
    })
    .then(res => res.json())
    .then(data => {
        btn.closest(".card").remove();

        const badge = document.getElementById("savedCountBadge");
        if (badge) {
            badge.innerText = data.count;
        }
    });
}
</script>

{% endblock %}
