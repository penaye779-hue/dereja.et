<!DOCTYPE html>
<html>
<body style="margin:0; font-family: Arial; background:#f4f6f8;">

<div style="max-width:600px; margin:auto; background:white; padding:20px; border-radius:8px;">

    <h2 style="color:#2c3e50;">🚀 New Jobs on DEREJA.et</h2>

    <p>Hello 👋,</p>

    <p>We found new job opportunities for you:</p>

    <ul>
        {% for job in jobs %}
            <li>
                <b>{{ job.title }}</b> - {{ job.company }} ({{ job.location }})
            </li>
        {% endfor %}
    </ul>

    <a href="http://127.0.0.1:8000/jobs/"
       style="display:inline-block; margin-top:15px; background:#4ca1af; color:white; padding:10px 15px; text-decoration:none; border-radius:5px;">
        View All Jobs
    </a>

    <hr>

    <p style="font-size:12px; color:#777;">
        You subscribed to DEREJA.et job alerts.
    </p>

</div>

</body>
</html>
